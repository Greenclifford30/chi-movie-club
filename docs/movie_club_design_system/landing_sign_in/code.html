<!-- Micro-interaction effects -->
<script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.violet-glow');
            if (glow) {
                const rect = glow.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Subtle reactive light effect based on mouse movement
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const moveX = (x - centerX) / 50;
                const moveY = (y - centerY) / 50;
                
                glow.style.transform = `perspective(1000px) rotateX(${-moveY}deg) rotateY(${moveX}deg)`;
            }
        });

        // Reset transform on mouse leave
        document.addEventListener('mouseleave', () => {
            const glow = document.querySelector('.violet-glow');
            if (glow) {
                glow.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            }
        });
    </script>
